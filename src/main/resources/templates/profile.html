<!DOCTYPE html>
<html lang="en">
<head>
    <title>Card Heaven - Profile</title>
    <meta charset="UTF-8">
    <meta name="author" content="Gonzalo Lopez">
    <meta name="description" content="First time in web dev.">
    <!--  viewport to make your website look good on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/CSS/profile.css">
    <link rel="stylesheet" href="/CSS/header.css">
    <link rel="stylesheet" href="/CSS/modal.css">
    <link rel="stylesheet" href="/CSS/modal-confirm.css">
    <link rel="stylesheet" href="/CSS/modal-error.css">

    <!-- JS -->
    <script src="/JS/header.js" defer></script>
    <script src="/JS/modal.js" defer></script>
    <script src="/JS/modal-message.js" defer></script>
    <script src="/JS/profile.js" defer></script>
</head>

<body>

<div class="body_container">

    <div id="header-placeholder"></div>

    <main>

        <section class="hero">

            <div id="logo_preview">
                <img src="/images/design/CardHeaven_centered_oneline.png">
            </div>

            <div id="title">
                <h1>My profile</h1>
            </div>

        </section>

        <section class="profile_section">

            <div class="profile_container">

                <form id="profile-form">

                    <!-- LEFT -->
                    <div class="profile_image">

                        <div class="image_frame">

                            <img
                                id="preview"
                                src="/images/design/user_placeholder.png"
                                alt="Profile preview"
                            >

                        </div>

                        <input
                            type="file"
                            class="choose"
                            id="profile_image"
                            accept="image/*"
                        >

                    </div>

                    <!-- RIGHT -->
                    <div class="info">

                        <div class="username">
                            <label for="username_ip">Username:</label>

                            <input
                                type="text"
                                id="username_ip"
                                disabled
                            >
                        </div>

                        <div class="name">
                            <label for="name_ip">First name:</label>

                            <input
                                type="text"
                                id="name_ip"
                            >
                        </div>

                        <div class="surname">
                            <label for="surname_ip">Last name:</label>

                            <input
                                type="text"
                                id="surname_ip"
                            >
                        </div>

                        <div class="email">
                            <label for="email_ip">Email:</label>

                            <input
                                type="email"
                                id="email_ip"
                            >
                        </div>

                        <button
                            type="submit"
                            class="submit"
                        >
                            Save changes
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>

<footer>
    <p><b>Copyleft CC-by 2025 by Gonzalo Lopez</b></p>
</footer>

<!-- Messages -->
<div id="modal-confirm" class="hidden">
    <img src="/images/design/checked.png" alt="check">
    <p></p>
</div>

<div id="modal-error" class="hidden">
    <img src="/images/design/cancel.png" alt="check">
    <p></p>
</div>

</body>
</html>
