<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- <style> to be added to different elements -->
        <title>Card Heaven - Online Trading Card Marketplace</title>
        <meta charset="UTF-8">
        <meta name="author" content="Gonzalo Lopez">
        <meta name="description" content="First time in web dev.">
        <!--  viewport to make your website look good on all devices -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="CSS/home.css">
    </head>
    <body>
        <div class="body_container">
            <header>
                <div class="header-container">
                    <!--  Links to other pages -->
                    <nav>
                    <ul id="nav_pages">
                        <li class="page"><a href="home.html">Home</a></li>
                        <li class="page"><a href="search.html">Search</a></li>
                        <li class="page"><a href="sell.html">Sell</a></li>
                        <li class="page"><a href="about.html">About</a></li>
                        <li class="page"><a href="contact.html">Contact</a></li>
                    </ul>
                    </nav>
                    <div id="account">
                        <!--  These go on right hand side of page, same height as nav -->
                        <button id="login" type="button">Log In</button>
                        <button id="signup" type="button">Sign Up</button>
                    </div>
                </div>
            </header>

            <main>
                <section class="hero">
                    <div id="logo_home">
                        <!--  Logo goes in the center of the page (size according to background) -->
                        <img src="images/design/CardHeaven_centered.png" alt="Home page logo">
                    </div>
                    <div id="search">
                        <h1>Discover All Our Offer!</h1>
                        <div class="search-container">
                            <!--  It should be a searching bar with magnifier icon inside the bar as a button -->
                            <button id="search_button" type="submit"></button>  
                            <input id="search_bar" type="search" name="query" placeholder="Search for cards...">
                        </div>
                    </div>
                    <div class="categories">
                        <!--  Each of thes buttons goes to search page and activates category filter -->
                        <button class="category">
                            <img src="images/design/pokemon_trading_card_game_logo.png" alt="Pokemon logo">
                        </button>
                        <button class="category">
                            <img src="images/design/Yu-Gi-Oh-Logo.png" alt="YGO logo">
                        </button>
                        <button class="category">
                            <img src="images/design/Magic-The-Gathering-Logo.png" alt="MTG logo">
                        </button>
                        <button id="category-football">
                            <img src="images/design/football.png" alt="Sports logo">
                            Sports
                        </button>
                    </div>
                </section>
                
                <section class="latest">
                    <!--  These are place holders, should show last 3 added actually -->
                    <!--  Images should be aligned -->
                    <h2>Check out our latest arrivals</h2>
                    <div class="latest_list">
                        <!--  Buttons should take to each cards preview page -->
                        <div class="latest_item">
                            <a href="card.html"><img src="images/steve.jpg"  alt="Trading card"></a>
                            <button class="viewmore" type="button">View More</button>
                        </div>
                        <div class="latest_item">
                            <a href="card.html"><img src="images/dragon.jpg"  alt="Trading card"></a>
                            <button class="viewmore" type="button">View More</button>
                        </div>
                        <div class="latest_item">
                            <a href="card.html"><img src="images/lucas.jpg"  alt="Trading card"></a>
                            <button class="viewmore" type="button">View More</button>
                        </div>
                    </div>
                </section>

                <section class="topvendors">
                    <!--  This section should display the cards offered by all vendors who have > 3 stars -->
                    <!--  Should be an horizontal list carousel -->
                    <h3>From our top-rated vendors</h3>
                    <div class="carousel">
                        <!-- Left Button -->
                        <button id="left"></button>
                            <!-- List Container -->
                        <div id="carousel_list" class="carousel_list">
                            <!-- Items (Placeholders) should link to card preview page -->
                            <!-- Data should be fetched from DB -->
                            <a class="carousel_item" href="card.html">
                                <img src="images/hydra.jpg" alt="Trading card">
                                <p>$56,75</p>
                            </a>

                            <a class="carousel_item" href="card.html">
                                <img src="images/camella.jpg" alt="Trading card">
                                <p>$56,75</p>
                            </a>

                            <a class="carousel_item" href="card.html">
                                <img src="images/chorizo.jpg" alt="Trading card">
                                <p>$56,75</p>
                            </a>

                            <a class="carousel_item" href="card.html">
                                <img src="images/faraon.jpg" alt="Trading card">
                                <p>$56,75</p>
                            </a>

                            <a class="carousel_item" href="card.html">
                                <img src="images/random_dragon.jpg" alt="Trading card">
                                <p>$56,75</p>
                            </a>

                            <a class="carousel_item" href="card.html">
                                <img src="images/messi-balon-de-oro.jpg" alt="Trading card">
                                <p>$56,75</p>
                            </a>

                            <a class="carousel_item" href="card.html">
                                <img src="images/zoroark.png" alt="Trading card">
                                <p>$56,75</p>
                            </a>

                            <a class="carousel_item" href="card.html">
                                <img src="images/kobe.jpg" alt="Trading card">
                                <p>$56,75</p>
                            </a>

                        </div>
                        <!-- Right Button -->
                        <button id="right"></button>
                    </div>
                </section>
            </main>
            
        </div>
        <div class="spacer"></div>
        <footer>
            <p><b>Copyleft CC-by 2025 by Gonzalo Lopez</b></p>
        </footer>
    </body>
