<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- <style> to be added to different elements -->
        <title>Card Heaven - Online Trading Card Marketplace</title>
        <meta charset="UTF-8">
        <meta name="author" content="Gonzalo Lopez">
        <meta name="description" content="First time in web dev.">
        <!--  viewport to make your website look good on all devices -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
            <link rel="stylesheet" href="CSS/contact.css">
    </head>
    <body>
        <div class="body_container">
             <header>
                <div class="header-container">
                    <!--  Links to other pages -->
                    <nav>
                    <ul id="nav_pages">
                        <li class="page"><a href="home.html">Home</a></li>
                        <li class="page"><a href="search.html">Search</a></li>
                        <li class="page"><a href="sell.html">Sell</a></li>
                        <li class="page"><a href="about.html">About</a></li>
                        <li class="page"><a href="contact.html">Contact</a></li>
                    </ul>
                    </nav>
                    <div id="account">
                        <!--  These go on right hand side of page, same height as nav -->
                        <button id="login" type="button">Log In</button>
                        <button id="signup" type="button">Sign Up</button>
                    </div>
                </div>
            </header>

            <main>
                <section class="hero">
                    <div id="logo_preview">
                        <!--  Logo goes in the center of the page (size according to background) -->
                        <img src="images/design/CardHeaven_centered_oneline.png" alt="Home page logo">
                    </div>
                    <div id ="title">
                        <h1>Send us an email</h1>
                    </div>
                </section>

                <section class="form"> 
                    <div class="container">
                        <form>
                            <div class="fields">
                                <div class="name">
                                    <label for="name_ip">First name:</label>
                                    <input type="text" id="name_ip" name="name_ip" placeholder="Peter" required>
                                </div>
                                <div class="lastname">
                                    <label for="lastname_ip">Last name:</label>
                                    <input type="text" id="lastname_ip" name="lastname_ip" placeholder="Parker" required>
                                </div>
                                <div class="email">
                                    <label for="email_ip">Email:</label>
                                    <input type="text" id="email_ip" name="email_ip" placeholder="peter.parker@hotmail.com" required>
                                </div>
                                <div class="subject">
                                    <label for="subject_ip">Subject:</label>
                                    <input type="text" id="subject_ip" name="subject_ip" placeholder="Peter Parker" required>
                                </div>
                                <div class="message">
                                    <label for="message_ip">Message:</label>
                                    <textarea id="message_ip" name="message_ip" placeholder="Describe your issue..."></textarea>
                                </div>
                            </div>
                            <div class="buttons">
                                <button class="submit" type="button">Submit</button>
                                <input type="file" class="choose" name="choose">
                            </div>
                        </form>
                    </div>            
                </section>
            </main>
        </div>

        <footer>
            <p><b>Copyleft CC-by 2025 by Gonzalo Lopez</b></p>
        </footer>
    </body>
